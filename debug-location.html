<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔍 Location & Map Debug Test</h1>
    
    <div class="test-section">
        <h3>1. Browser Geolocation Test</h3>
        <button onclick="testGeolocation()">Test Geolocation</button>
        <div id="geo-results"></div>
    </div>
    
    <div class="test-section">
        <h3>2. OpenStreetMap Load Test</h3>
        <button onclick="testMapLoad()">Test Map Loading</button>
        <div id="map-results"></div>
        <div id="map-container" style="height: 300px; margin-top: 10px;"></div>
    </div>
    
    <div class="test-section">
        <h3>3. Backend API Test</h3>
        <button onclick="testBackendAPI()">Test Backend APIs</button>
        <div id="api-results"></div>
    </div>
    
    <div id="results"></div>

    <script>
        function log(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error' : 'success';
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}:</strong> ${message}`;
            results.appendChild(div);
        }

        function testGeolocation() {
            const results = document.getElementById('geo-results');
            results.innerHTML = '<p>Testing geolocation...</p>';
            
            if (!navigator.geolocation) {
                results.innerHTML = '<p style="color: red;">❌ Geolocation not supported by this browser</p>';
                log('❌ Geolocation not supported', 'error');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    results.innerHTML = `
                        <p style="color: green;">✅ Geolocation successful!</p>
                        <p>Latitude: ${latitude}</p>
                        <p>Longitude: ${longitude}</p>
                        <p>Accuracy: ${position.coords.accuracy} meters</p>
                    `;
                    log(`✅ Geolocation successful: ${latitude}, ${longitude}`);
                },
                (error) => {
                    let errorMsg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = 'Location permission denied by user';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMsg = 'Location information unavailable';
                            break;
                        case error.TIMEOUT:
                            errorMsg = 'Location request timed out';
                            break;
                        default:
                            errorMsg = 'Unknown location error';
                    }
                    results.innerHTML = `<p style="color: red;">❌ ${errorMsg}</p>`;
                    log(`❌ Geolocation failed: ${errorMsg}`, 'error');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 300000
                }
            );
        }

        function testMapLoad() {
            const results = document.getElementById('map-results');
            results.innerHTML = '<p>Loading OpenStreetMap...</p>';
            
            // Load Leaflet CSS
            const leafletCSS = document.createElement('link');
            leafletCSS.rel = 'stylesheet';
            leafletCSS.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
            document.head.appendChild(leafletCSS);
            
            // Load Leaflet JS
            const leafletJS = document.createElement('script');
            leafletJS.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
            leafletJS.onload = function() {
                try {
                    // Initialize map
                    const map = L.map('map-container').setView([27.7172, 85.3240], 12);
                    
                    // Add OpenStreetMap tiles
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(map);
                    
                    // Add a marker
                    L.marker([27.7172, 85.3240]).addTo(map)
                        .bindPopup('Kathmandu - Default Location')
                        .openPopup();
                    
                    results.innerHTML = '<p style="color: green;">✅ OpenStreetMap loaded successfully!</p>';
                    log('✅ OpenStreetMap loaded and initialized');
                } catch (error) {
                    results.innerHTML = `<p style="color: red;">❌ Map initialization failed: ${error.message}</p>`;
                    log(`❌ Map initialization failed: ${error.message}`, 'error');
                }
            };
            leafletJS.onerror = function() {
                results.innerHTML = '<p style="color: red;">❌ Failed to load Leaflet library</p>';
                log('❌ Failed to load Leaflet library', 'error');
            };
            document.head.appendChild(leafletJS);
        }

        async function testBackendAPI() {
            const results = document.getElementById('api-results');
            results.innerHTML = '<p>Testing backend APIs...</p>';
            
            try {
                // Test nearby doctors
                const nearbyResponse = await fetch('http://localhost:3000/doctors/nearby?lat=27.7172&lng=85.3240&maxDistance=25');
                const nearbyData = await nearbyResponse.json();
                
                // Test search
                const searchResponse = await fetch('http://localhost:3000/doctors/search');
                const searchData = await searchResponse.json();
                
                results.innerHTML = `
                    <p style="color: green;">✅ Backend APIs working!</p>
                    <p>Nearby doctors: ${nearbyData.count} found</p>
                    <p>Search doctors: ${searchData.count} found</p>
                    <p>First doctor location: ${nearbyData.doctors?.[0]?.location ? '✅' : '❌'}</p>
                `;
                log('✅ Backend APIs working correctly');
            } catch (error) {
                results.innerHTML = `<p style="color: red;">❌ Backend API test failed: ${error.message}</p>`;
                log(`❌ Backend API test failed: ${error.message}`, 'error');
            }
        }

        // Auto-run tests on page load
        window.onload = function() {
            log('🔍 Debug page loaded - Run tests to identify issues');
        };
    </script>
</body>
</html>
